<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Бібліотека — система управління книгами">
    <title>{% block title %}Бібліотека{% endblock %}</title>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('books.book_list') }}" class="navbar-brand">
                <span class="icon">📚</span> Бібліотека
            </a>
            <a href="{{ url_for('books.book_list') }}" class="navbar-link">Усі книги</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            &copy; 2026 Бібліотека — Лабораторна робота з Веб-програмування
        </div>
    </footer>

</body>
</html>
