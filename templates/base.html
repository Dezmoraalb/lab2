<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Бібліотека — система управління книгами">
    <title>{% block title %}Бібліотека{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('books.book_list') }}" class="navbar-brand">
                <i data-lucide="library" class="icon"></i>
                <span>Бібліотека</span>
            </a>
            <div class="navbar-links">
                <a href="{{ url_for('books.book_list') }}" class="navbar-link">
                    <i data-lucide="book-open" class="icon-sm"></i>
                    Усі книги
                </a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            &copy; 2026 Бібліотека — Лабораторна робота з Веб-програмування
        </div>
    </footer>

    <script>lucide.createIcons();</script>

</body>
</html>
