{% extends "base.html" %}

{% block title %}
    {% if book %}Редагувати: {{ book.title }}{% else %}Нова книга{% endif %} — Бібліотека
{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        {% if book %}
            <i data-lucide="pencil-line" class="icon-title"></i> Редагувати книгу
        {% else %}
            <i data-lucide="file-plus-2" class="icon-title"></i> Додати нову книгу
        {% endif %}
    </h1>
    <a href="{{ url_for('books.book_list') }}" class="btn btn-outline">
        <i data-lucide="arrow-left" class="icon-btn"></i> До каталогу
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST"
              action="{% if book %}{{ url_for('books.book_edit', book_id=book.id) }}{% else %}{{ url_for('books.book_create') }}{% endif %}">

            <!-- Title -->
            <div class="form-group">
                <label for="title" class="form-label">
                    <i data-lucide="type" class="icon-xs"></i> Назва книги
                </label>
                <input type="text"
                       id="title"
                       name="title"
                       class="form-control"
                       value="{{ book.title if book else '' }}"
                       required
                       placeholder="Введіть назву книги">
            </div>

            <!-- Published Year -->
            <div class="form-group">
                <label for="published_year" class="form-label">
                    <i data-lucide="calendar" class="icon-xs"></i> Рік публікації
                </label>
                <input type="number"
                       id="published_year"
                       name="published_year"
                       class="form-control"
                       value="{{ book.published_year if book else '' }}"
                       required
                       min="1000"
                       max="2100"
                       placeholder="Наприклад: 1840">
            </div>

            <!-- Author dropdown -->
            <div class="form-group">
                <label for="author_id" class="form-label">
                    <i data-lucide="user" class="icon-xs"></i> Автор
                </label>
                <select id="author_id" name="author_id" class="form-control" required>
                    <option value="">— Оберіть автора —</option>
                    {% for author in authors %}
                    <option value="{{ author.id }}"
                            {% if book and book.author_id == author.id %}selected{% endif %}>
                        {{ author.full_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Form actions -->
            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    {% if book %}
                        <i data-lucide="save" class="icon-btn"></i> Зберегти зміни
                    {% else %}
                        <i data-lucide="check" class="icon-btn"></i> Створити книгу
                    {% endif %}
                </button>
                <a href="{{ url_for('books.book_list') }}" class="btn btn-outline">
                    <i data-lucide="x" class="icon-btn"></i> Скасувати
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
